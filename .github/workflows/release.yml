name: Sample Release

on:
  push:
    tags:
      - "sample-v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Semantic version for the sample package, for example 1.0.0"
        required: false
        type: string
      release_tag:
        description: "GitHub release tag for the binary artifact, defaults to sample-v<release_version>"
        required: false
        type: string
      publish_manifest_repository:
        description: "Also publish Package.swift into a dedicated repo or branch"
        required: false
        type: boolean
        default: false
      manifest_repository:
        description: "Optional owner/repo for a separate manifest repository"
        required: false
        type: string
      manifest_repository_branch:
        description: "Branch to commit Package.swift into"
        required: false
        type: string
        default: "main"
      manifest_repository_subdirectory:
        description: "Optional subdirectory inside the manifest repository"
        required: false
        type: string
        default: ""
      overwrite_existing_release_asset:
        description: "Allow replacing an already-published GitHub release asset on the same tag"
        required: false
        type: boolean
        default: false

jobs:
  publish-sample-xcframework:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      PUBLISH_MANIFEST_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_manifest_repository || 'false' }}
      MANIFEST_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.manifest_repository || '' }}
      MANIFEST_REPOSITORY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.manifest_repository_branch || 'main' }}
      MANIFEST_REPOSITORY_SUBDIRECTORY: ${{ github.event_name == 'workflow_dispatch' && inputs.manifest_repository_subdirectory || '' }}
      OVERWRITE_EXISTING_RELEASE_ASSET: ${{ github.event_name == 'workflow_dispatch' && inputs.overwrite_existing_release_asset || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve sample release version and tag
        id: release_version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.release_version }}"
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#sample-v}"
          fi

          if [ -z "${version}" ]; then
            echo "Unable to resolve a sample release version."
            exit 1
          fi

          if [ -z "${tag}" ]; then
            tag="sample-v${version}"
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Extract sample release notes
        id: release_notes
        run: |
          output_file="${RUNNER_TEMP}/sample-release-notes.md"
          bash ./scripts/extract-release-notes.sh \
            "${{ steps.release_version.outputs.value }}" \
            CHANGELOG.md \
            "${output_file}"

          {
            echo "body<<EOF"
            cat "${output_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate external manifest repository token
        if: env.PUBLISH_MANIFEST_REPOSITORY == 'true' && env.MANIFEST_REPOSITORY != '' && secrets.MANIFEST_REPOSITORY_TOKEN == ''
        run: |
          echo "MANIFEST_REPOSITORY_TOKEN is required when publishing Package.swift to a separate repository."
          exit 1

      - name: Checkout manifest repository from current repo
        if: env.PUBLISH_MANIFEST_REPOSITORY == 'true' && env.MANIFEST_REPOSITORY == ''
        uses: actions/checkout@v4
        with:
          path: manifest-repo
          fetch-depth: 0

      - name: Checkout external manifest repository
        if: env.PUBLISH_MANIFEST_REPOSITORY == 'true' && env.MANIFEST_REPOSITORY != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPOSITORY }}
          token: ${{ secrets.MANIFEST_REPOSITORY_TOKEN }}
          path: manifest-repo
          fetch-depth: 0

      - name: Publish sample package
        run: |
          manifest_repo_args=()
          if [ "${PUBLISH_MANIFEST_REPOSITORY}" = "true" ]; then
            manifest_repo_args+=(
              "-Pkmp.apple.packager.publishManifestRepository=true"
              "-Pkmp.apple.packager.pushManifestRepository=true"
              "-Pkmp.apple.packager.manifestRepositoryPath=${GITHUB_WORKSPACE}/manifest-repo"
              "-Pkmp.apple.packager.manifestRepositoryBranch=${MANIFEST_REPOSITORY_BRANCH}"
              "-Pkmp.apple.packager.manifestRepositorySubdirectory=${MANIFEST_REPOSITORY_SUBDIRECTORY}"
            )
          fi

          ./gradlew -p samples/kmp-library publishApplePackage \
            -Pkmp.apple.packager.sampleVersion=${{ steps.release_version.outputs.value }} \
            -Pkmp.apple.packager.githubTag=${{ steps.release_version.outputs.tag }} \
            -Pkmp.apple.packager.releaseName=${{ steps.release_version.outputs.tag }} \
            -Pkmp.apple.packager.publishRelease=true \
            -Pkmp.apple.packager.overwriteExistingReleaseAsset=${OVERWRITE_EXISTING_RELEASE_ASSET} \
            -Pkmp.apple.packager.validatePackage=true \
            "${manifest_repo_args[@]}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
          KMP_APPLE_PACKAGER_RELEASE_NOTES: ${{ steps.release_notes.outputs.body }}

      - name: Upload package metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sample-package-metadata
          path: |
            ${{ runner.temp }}/sample-release-notes.md
            samples/kmp-library/build/kmpApplePackager/configuration/report.properties
            samples/kmp-library/build/kmpApplePackager/artifactStructure/report.properties
            samples/kmp-library/build/kmpApplePackager/artifactVerification/report.properties
            samples/kmp-library/build/kmpApplePackager/metadata/package-metadata.json
            samples/kmp-library/build/kmpApplePackager/release/publish.properties
            samples/kmp-library/build/kmpApplePackager/release/support-assets.properties
            samples/kmp-library/build/kmpApplePackager/release/assets
            samples/kmp-library/build/kmpApplePackager/release/bundle
            samples/kmp-library/build/kmpApplePackager/packageRepository/publish.properties
            samples/kmp-library/build/kmpApplePackager/validation/report.properties

      - name: Validate published manifest repository
        if: env.PUBLISH_MANIFEST_REPOSITORY == 'true'
        run: swift package dump-package
        working-directory: manifest-repo

name: Publish Gradle Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Final plugin version, for example 1.0.0 or 1.0.0-rc.1"
        required: false
        type: string
      validate_only:
        description: "Validate against the Plugin Portal without creating a public release"
        required: false
        type: boolean
        default: false

jobs:
  publish-plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve release version
        id: release_version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_version }}" ]; then
            version="${{ inputs.release_version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [ -z "${version}" ]; then
            echo "Unable to resolve a release version."
            exit 1
          fi

          if printf '%s' "${version}" | grep -qi 'snapshot'; then
            echo "Plugin Portal releases must use a final version, not ${version}."
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Extract release notes from changelog
        run: |
          bash ./scripts/extract-release-notes.sh \
            "${{ steps.release_version.outputs.value }}" \
            CHANGELOG.md \
            "${RUNNER_TEMP}/plugin-release-notes.md"

      - name: Verify plugin build
        run: ./gradlew :plugin:check -PreleaseVersion=${{ steps.release_version.outputs.value }}

      - name: Publish plugin to local staging repository
        run: ./gradlew :plugin:publishAllPublicationsToPluginStagingRepository -PreleaseVersion=${{ steps.release_version.outputs.value }}

      - name: Upload staged plugin artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-staging-repository
          path: |
            plugin/build/staging-repo
            ${{ runner.temp }}/plugin-release-notes.md

      - name: Publish plugin to the Gradle Plugin Portal
        run: |
          publish_args=()
          if [ "${{ inputs.validate_only || 'false' }}" = "true" ]; then
            publish_args+=("--validate-only")
          fi

          ./gradlew :plugin:publishPlugins \
            -PreleaseVersion=${{ steps.release_version.outputs.value }} \
            "${publish_args[@]}"
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

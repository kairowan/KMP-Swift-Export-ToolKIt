name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  plugin-and-sample:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release_version
        run: |
          version="$(bash ./scripts/current-release-version.sh)"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Verify version consistency
        run: bash ./scripts/verify-version-consistency.sh ${{ steps.release_version.outputs.value }}

      - name: Build plugin
        run: ./gradlew :plugin:check

      - name: Publish plugin to local staging repository
        run: ./gradlew :plugin:publishAllPublicationsToPluginStagingRepository

      - name: Dry-run sample packager
        run: ./gradlew -p samples/kmp-library publishApplePackage

      - name: Validate generated metadata
        run: |
          test -f samples/kmp-library/build/kmpApplePackager/configuration/report.properties
          test -f samples/kmp-library/build/kmpApplePackager/artifactStructure/report.properties
          test -f samples/kmp-library/build/kmpApplePackager/artifactVerification/report.properties
          test -f samples/kmp-library/build/kmpApplePackager/release/support-assets.properties
          test -f samples/kmp-library/build/kmpApplePackager/metadata/package-metadata.json
          test -f samples/kmp-library/build/kmpApplePackager/release/assets/Shared-${RELEASE_VERSION}.Package.swift
          test -f samples/kmp-library/build/kmpApplePackager/release/assets/Shared-${RELEASE_VERSION}.sha256
          test -f samples/kmp-library/build/kmpApplePackager/release/assets/Shared-${RELEASE_VERSION}.package-metadata.json
          test -f samples/kmp-library/build/kmpApplePackager/release/bundle/report.properties
          test -f samples/kmp-library/build/kmpApplePackager/release/bundle/Shared-${RELEASE_VERSION}-release-bundle.zip
          test -f samples/kmp-library/build/kmpApplePackager/release/bundle/Shared-${RELEASE_VERSION}-release-bundle/bundle-manifest.json
          ruby -rjson -e 'JSON.parse(File.read(ARGV[0]))' samples/kmp-library/build/kmpApplePackager/metadata/package-metadata.json
          ruby -e 'props = File.read(ARGV[0]); abort("artifact structure validation did not pass") unless props.include?("status=valid")' \
            samples/kmp-library/build/kmpApplePackager/artifactStructure/report.properties
          ruby -e 'props = File.read(ARGV[0]); abort("support asset dry-run status missing") unless props.include?("status=skipped")' \
            samples/kmp-library/build/kmpApplePackager/release/support-assets.properties
          ruby -e 'props = File.read(ARGV[0]); abort("release bundle was not assembled") unless props.include?("status=assembled")' \
            samples/kmp-library/build/kmpApplePackager/release/bundle/report.properties
          python3 -c 'import os, zipfile; version = os.environ["RELEASE_VERSION"]; archive = f"samples/kmp-library/build/kmpApplePackager/distributions/Shared-{version}.xcframework.zip"; offenders = [name for name in zipfile.ZipFile(archive).namelist() if name.startswith("__MACOSX/")]; (_ for _ in ()).throw(SystemExit(f"unexpected __MACOSX entries: {offenders}")) if offenders else None'
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}

      - name: Local artifact download verification
        run: |
          mkdir -p samples/kmp-library/build/kmpApplePackager/distributions
          python3 -m http.server 8765 --directory samples/kmp-library/build/kmpApplePackager/distributions >/tmp/kmp-apple-packager-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT

          ./gradlew -p samples/kmp-library publishApplePackage --rerun-tasks \
            -Pkmp.apple.packager.artifactUrlOverride=http://127.0.0.1:8765/Shared-${RELEASE_VERSION}.xcframework.zip

          ruby -e 'props = File.read(ARGV[0]); abort("artifact verification did not pass") unless props.include?("status=verified")' \
            samples/kmp-library/build/kmpApplePackager/artifactVerification/report.properties
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}

      - name: Smoke test generated Swift package consumer
        run: ./gradlew -p samples/kmp-library smokeTestIosConsumer

      - name: Dry-run manifest repository sync
        run: |
          temp_repo="$(mktemp -d)"
          git init -b main "$temp_repo"
          printf '# Manifest Repo\n' > "$temp_repo/README.md"
          git -C "$temp_repo" add README.md
          git -C "$temp_repo" -c user.name='CI Bot' -c user.email='ci@example.com' commit -m 'Initial commit'

          ./gradlew -p samples/kmp-library publishApplePackage \
            -Pkmp.apple.packager.publishManifestRepository=true \
            -Pkmp.apple.packager.manifestRepositoryPath="$temp_repo" \
            -Pkmp.apple.packager.manifestRepositoryBranch=main

          test -f "$temp_repo/Package.swift"
          swift package dump-package --package-path "$temp_repo"

      - name: Manifest repository git worktree support
        run: |
          base_repo="$(mktemp -d)"
          worktree_parent="$(mktemp -d)"
          worktree_path="$worktree_parent/manifest-worktree"
          git init -b main "$base_repo"
          printf '# Manifest Repo\n' > "$base_repo/README.md"
          git -C "$base_repo" add README.md
          git -C "$base_repo" -c user.name='CI Bot' -c user.email='ci@example.com' commit -m 'Initial commit'
          git -C "$base_repo" worktree add -b release "$worktree_path"

          ./gradlew -p samples/kmp-library publishApplePackage \
            -Pkmp.apple.packager.publishManifestRepository=true \
            -Pkmp.apple.packager.manifestRepositoryPath="$worktree_path" \
            -Pkmp.apple.packager.manifestRepositoryBranch=release \
            -Pkmp.apple.packager.manifestCommitUserName='CI Bot' \
            -Pkmp.apple.packager.manifestCommitUserEmail='ci@example.com'

          test -f "$worktree_path/Package.swift"
          swift package dump-package --package-path "$worktree_path"
          ruby -e 'props = File.read(ARGV[0]); abort("missing commit author metadata") unless props.include?("commitAuthorName=CI Bot")' \
            samples/kmp-library/build/kmpApplePackager/packageRepository/publish.properties

      - name: Dirty manifest repository safety check
        run: |
          temp_repo="$(mktemp -d)"
          git init -b main "$temp_repo"
          printf '# Manifest Repo\n' > "$temp_repo/README.md"
          git -C "$temp_repo" add README.md
          git -C "$temp_repo" -c user.name='CI Bot' -c user.email='ci@example.com' commit -m 'Initial commit'
          printf 'dirty\n' >> "$temp_repo/README.md"

          if ./gradlew -p samples/kmp-library publishApplePackage \
            -Pkmp.apple.packager.publishManifestRepository=true \
            -Pkmp.apple.packager.manifestRepositoryPath="$temp_repo" \
            -Pkmp.apple.packager.manifestRepositoryBranch=main; then
            echo "Expected dirty manifest repository publish to fail."
            exit 1
          fi

      - name: SwiftPM manifest syntax check
        run: swift package dump-package
        working-directory: samples/kmp-library/build/kmpApplePackager/package
